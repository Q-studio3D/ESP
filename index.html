<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QS3D Pro Installer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://unpkg.com/esp-connect@1.1.11-preview/dist/esp-connect/esp-connect.esm.js"></script>
    <style>
        body { background-color: #000; color: white; margin: 0; font-family: sans-serif; height: 100vh; overflow: hidden; }
        nav { height: 44px; display: flex; align-items: center; background: #161617; border-bottom: 1px solid #333; padding: 0 20px; }
        .nav-item { color: #86868b; margin-right: 20px; font-size: 13px; }
        /* Quan trọng: Để Dashboard chiếm hết phần còn lại */
        esp-connect { height: calc(100vh - 44px); width: 100%; }
    </style>
</head>
<body>
    <nav>
        <img src="QS3D.png" style="height: 20px; margin-right: 10px;">
        <span class="nav-item">QS3D Installer</span>
        <div class="hidden md:flex">
            <span class="nav-item">Device Info</span>
            <span class="nav-item">Flash Tools</span>
            <span class="nav-item">Serial Monitor</span>
        </div>
    </nav>

    <esp-connect></esp-connect>

</body>
</html>
